name: Build Weather Screen Saver

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Build Rust
        run: cargo build --release
        working-directory: weathr-core

      - name: Generate Xcode
        run: xcodegen generate
        working-directory: macos-screensaver

      - name: Build ScreenSaver
        run: |
          xcodebuild -project WeatherSaver.xcodeproj -scheme WeatherSaver -configuration Release build \
            LIBRARY_SEARCH_PATHS="${{ github.workspace }}/weathr-core/target/release" \
            OTHER_LDFLAGS="-L${{ github.workspace }}/weathr-core/target/release -lweathr"
        working-directory: macos-screensaver

      - name: Copy build output
        run: |
          cp -r ~/Library/Developer/Xcode/DerivedData/WeatherSaver-*/Build/Products/Release/Weather.saver ./build-output/
          mkdir -p build-output/Weather.saver/Contents/MacOS
        working-directory: macos-screensaver

      - name: Create zip
        run: zip -r Weather.saver.zip Weather.saver
        working-directory: macos-screensaver/build-output

      - name: Get tag version
        id: get_tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            # Check if there's an existing tag
            TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
            echo "version=$TAG" >> $GITHUB_OUTPUT
          fi

      - name: Upload to Release
        if: steps.get_tag.outputs.version != ''
        uses: softprops/action-gh-release@v1
        with:
          files: macos-screensaver/build-output/Weather.saver.zip
          draft: false
          tag_name: ${{ steps.get_tag.outputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WeatherSaver
          path: macos-screensaver/build-output/Weather.saver.zip
