name: Build Weather Screen Saver

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode
        run: |
          cd macos-screensaver
          xcodegen generate
          sed -i '' 's/objectVersion = 77;/objectVersion = 56;/g' WeatherSaver.xcodeproj/project.pbxproj

      - name: Build ScreenSaver
        run: |
          cd macos-screensaver
          xcodebuild -project WeatherSaver.xcodeproj -scheme WeatherSaver -configuration Release install DSTROOT=$GITHUB_WORKSPACE/build/root CODE_SIGN_IDENTITY=- CODE_SIGNING_REQUIRED=NO

      - name: Sign bundle
        run: |
          SAVOR_PATH=$(find $GITHUB_WORKSPACE/build -name "*.saver" -type d 2>/dev/null | head -1)
          if [ -n "$SAVOR_PATH" ]; then
            codesign --force --deep --sign - "$SAVOR_PATH"
            xattr -cr "$SAVOR_PATH"
          fi

      - name: Package zip
        run: |
          SAVOR_PATH=$(find $GITHUB_WORKSPACE/build -name "*.saver" -type d 2>/dev/null | head -1)
          ditto -V -c -k --keepParent "$SAVOR_PATH" $GITHUB_WORKSPACE/Weather.saver.zip

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: Weather.saver.zip
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WeatherSaver
          path: Weather.saver.zip
