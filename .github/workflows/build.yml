name: Build Weather Screen Saver

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Build Rust
        run: |
          rustup target add x86_64-apple-darwin aarch64-apple-darwin
          cargo build --release --target x86_64-apple-darwin
          cargo build --release --target aarch64-apple-darwin
          lipo -create target/x86_64-apple-darwin/release/libweathr.dylib target/aarch64-apple-darwin/release/libweathr.dylib -output target/release/libweathr.dylib
        working-directory: weathr-core

      - name: Copy dylib to project
        run: |
          cp ../weathr-core/target/release/libweathr.dylib macos-screensaver/WeatherSaver/Sources/
          install_name_tool -id "@executable_path/../Frameworks/libweathr.dylib" macos-screensaver/WeatherSaver/Sources/libweathr.dylib
        working-directory: ${{ github.workspace }}

      - name: Generate Xcode
        run: |
          xcodegen generate
          # Fix project format for Xcode 15.4 compatibility
          sed -i '' 's/objectVersion = 77;/objectVersion = 56;/g' WeatherSaver.xcodeproj/project.pbxproj
        working-directory: macos-screensaver

      - name: Build and Install ScreenSaver
        run: |
          # Debug: check if library exists
          ls -la ../weathr-core/target/release/libweathr.a || echo "Library not found!"
          
          xcodebuild -project WeatherSaver.xcodeproj -scheme WeatherSaver -configuration Release install DSTROOT=build/root \
            LIBRARY_SEARCH_PATHS="${{ github.workspace }}/weathr-core/target/release" \
            OTHER_LDFLAGS="-L${{ github.workspace }}/weathr-core/target/release -lweathr" \
            CODE_SIGN_IDENTITY=- CODE_SIGNING_REQUIRED=NO
        working-directory: macos-screensaver

      - name: Find .saver path
        id: finder
        run: |
          SAVOR_PATH=$(find build -name "*.saver" -type d 2>/dev/null | head -1)
          if [ -z "$SAVOR_PATH" ]; then
            SAVOR_PATH=$(find . -name "*.saver" -type d 2>/dev/null | head -1)
          fi
          # Copy dylib to bundle
          if [ -n "$SAVOR_PATH" ]; then
            cp ../weathr-core/target/release/libweathr.dylib "$SAVOR_PATH/Contents/Frameworks/"
          fi
          echo "Found: $SAVOR_PATH"
          echo "path=$SAVOR_PATH" >> $GITHUB_OUTPUT

      - name: Package zip
        run: |
          ditto -V -c -k --keepParent "${{ steps.finder.outputs.path }}" Weather.saver.zip

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: Weather.saver.zip
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WeatherSaver
          path: Weather.saver.zip
