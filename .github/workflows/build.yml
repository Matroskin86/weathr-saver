name: Build Weather Screen Saver

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [created]

jobs:
  build:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Build Rust
        run: cargo build --release
        working-directory: weathr-core

      - name: Generate Xcode
        run: xcodegen generate
        working-directory: macos-screensaver

      - name: Build ScreenSaver
        run: |
          xcodebuild -project WeatherSaver.xcodeproj -scheme WeatherSaver -configuration Release build \
            LIBRARY_SEARCH_PATHS="${{ github.workspace }}/weathr-core/target/release" \
            OTHER_LDFLAGS="-L${{ github.workspace }}/weathr-core/target/release -lweathr"
        working-directory: macos-screensaver

      - name: Create zip
        run: zip -r Weather.saver.zip Weather.saver
        working-directory: macos-screensaver/build/Release/WeatherSaver.build/Products/Release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WeatherSaver
          path: macos-screensaver/build/Release/WeatherSaver.build/Products/Release/Weather.saver.zip

  release:
    needs: build
    runs-on: macos-13
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: WeatherSaver

      - uses: softprops/action-gh-release@v1
        with:
          files: Weather.saver.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
