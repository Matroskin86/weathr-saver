name: Build Weather Screen Saver

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  release:
    types: [created]

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        run: |
          if ! command -v rustc &> /dev/null; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          fi
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install Xcode
        run: |
          brew install xcodes
          xcodes install 15.2 --select --hide-logs
          sudo xcode-select -s /Applications/Xcode_15.2.app/Contents/Developer

      - name: Accept Xcode license
        run: |
          sudo xcodebuild -license accept

      - name: Build Rust library
        working-directory: weathr-core
        run: |
          cargo build --release

      - name: Generate Xcode project
        working-directory: macos-screensaver
        run: |
          xcodegen generate

      - name: Build ScreenSaver
        working-directory: macos-screensaver
        run: |
          xcodebuild -project WeatherSaver.xcodeproj -scheme WeatherSaver -configuration Release build LIBRARY_SEARCH_PATHS="${{ github.workspace }}/weathr-core/target/release" OTHER_LDFLAGS="-L${{ github.workspace }}/weathr-core/target/release -lweathr"

      - name: Create zip
        working-directory: macos-screensaver/build/Release/WeatherSaver.build/Products/Release
        run: |
          zip -r Weather.saver.zip Weather.saver

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WeatherSaver
          path: macos-screensaver/build/Release/WeatherSaver.build/Products/Release/Weather.saver.zip

  release:
    needs: build
    runs-on: macos-14
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: WeatherSaver

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: Weather.saver.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
