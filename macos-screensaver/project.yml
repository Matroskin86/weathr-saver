name: WeatherSaver
options:
  bundleIdPrefix: com.weathr
  deploymentTarget:
    macOS: "13.0"
  generateEmptyDirectories: true
  projectFormat: xcode14_0

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"

targets:
  WeatherSaver:
    type: bundle
    platform: macOS
    sources:
      - path: WeatherSaver/Sources
        type: group
      - path: WeatherSaver/Resources
        type: group
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.weathr.screensaver
        PRODUCT_NAME: Weather
        WRAPPER_EXTENSION: saver
        INFOPLIST_FILE: WeatherSaver/Resources/Info.plist
        CLANG_ENABLE_MODULES: YES
        SWIFT_OBJC_INTERFACE_HEADER_NAME: ""
        COMBINE_HIDPI_IMAGES: YES
        INSTALL_PATH: "$(HOME)/Library/Screen Savers"
        SKIP_INSTALL: NO
    dependencies:
      - framework: ScreenSaver.framework
        embed: false
      - sdk: SystemConfiguration.framework
      - sdk: Security.framework
      - sdk: Foundation.framework
